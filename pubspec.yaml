name: my_driver_app
description: "A professional ride-hailing application for riders."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.1
  http: ^1.2.0

  # Maps & Location
  google_maps_flutter: ^2.6.1
  location: ^5.0.3
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  flutter_polyline_points: ^2.1.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  confetti: ^0.7.0
  flutter_spinkit: ^5.2.1
  dotted_line: ^3.1.0

  # Utilities
  image_picker: ^1.0.7
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true